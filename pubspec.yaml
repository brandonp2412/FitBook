name: fit_book
description: Track your calories - Completely offline!
publish_to: none
version: 2.0.59+177
environment:
  sdk: ">=3.3.3 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  drift: 2.34.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.3
  path: ^1.9.0
  provider: ^6.1.2
  dynamic_color: ^1.7.0
  file_picker: ^12.0.0-beta.7
  fl_chart: ^1.2.0
  intl: ^0.20.2
  csv: ^8.0.0
  sqlite3: ^3.3.4
  share_plus: ^13.2.0
  package_info_plus: ^10.2.0
  url_launcher: ^6.2.6
  badges: ^3.1.2
  openfoodfacts: ^3.11.0
  archive: ^4.0.2
  cached_network_image: ^3.4.1
  barcode_scan2: ^4.3.2
  permission_handler: ^12.0.1
  flutter_local_notifications: ^22.0.1
  workmanager: ^0.9.0+3
dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.3
  msix: ^3.16.7
  drift_dev: ^2.24.0
  test: ^1.25.8
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/changelogs/
flutter_launcher_icons:
  android: false
  ios: true
  image_path: assets/ic_launcher.png
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/ic_launcher.png
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: assets/ic_launcher.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/ic_launcher.png
msix_config:
  msstore_appId: 9PJJVF8507G0
  display_name: FitBook - Calorie tracker
  publisher_display_name: Brandon Dick
  identity_name: FrisbeeSoftware.FitBook-Calorietracker
  msix_version: 1.0.104.0
  logo_path: assets/ic_launcher.png
  trim_logo: false
  publisher: CN=BB0811CB-EED5-441C-BE1B-D31F391F76DE
  store: true
  capabilities: internetClient
